name: GannMT5Pro

# ── Opciones globales ────────────────────────────────────────────
options:
  bundleIdPrefix: com.gannmt5pro
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

# ── Settings globales ────────────────────────────────────────────
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

# ── Targets ──────────────────────────────────────────────────────
targets:
  GannMT5Pro:
    type: application
    platform: iOS
    deploymentTarget: "15.0"

    # Fuentes Swift
    sources:
      - path: Sources/GannMT5Pro
        type: group

    # Assets y plist
    resources:
      - path: Assets.xcassets
      - path: Resources/Info.plist
        buildPhase: none          # sólo referencia, no copiar

    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: "GannMT5 Pro"
        CFBundleIdentifier: com.gannmt5pro.app
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        MinimumOSVersion: "15.0"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UIUserInterfaceStyle: Dark
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true    # Permite WSS a Deriv
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gannmt5pro.app
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        DEVELOPMENT_TEAM: ""
        SKIP_INSTALL: NO
        ENABLE_BITCODE: NO

# ── Schemes ──────────────────────────────────────────────────────
schemes:
  GannMT5Pro:
    build:
      targets:
        GannMT5Pro: all
    run:
      config: Debug
    archive:
      config: Release
